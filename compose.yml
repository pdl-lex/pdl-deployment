services:
  caddy:
    image: caddy:latest
    container_name: adl-caddy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - ".env"
    volumes:
      - ./conf:/etc/caddy
      - caddy_data:/data
      - caddy_config:/config
      - /wb/static:/wb/static:ro
    networks:
      - adl-network
  mongodb:
    image: mongo:8
    container_name: adl-mongodb
    env_file:
      - ".env"
    volumes:
      - mongodb_data:/data/db
    networks:
      - adl-network
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
  adl-api:
    image: ghcr.io/pdl-lex/pdl-api:latest
    container_name: adl-api
    env_file:
      - ".env"
    networks:
      - adl-network
    depends_on:
      - mongodb
    restart: unless-stopped
    command:
      [
        "uv",
        "run",
        "fastapi",
        "run",
        "app/main.py",
        "--proxy-headers",
        "--port",
        "80",
      ]
  adl-platform:
    image: ghcr.io/pdl-lex/pdl-platform:latest
    container_name: adl-platform
    env_file:
      - ".env"
    networks:
      - adl-network
    depends_on:
      - adl-api
    restart: unless-stopped
  pdl-cms:
    image: ghcr.io/pdl-lex/pdl-cms:latest
    container_name: pdl-cms
    depends_on:
      - mongodb
    environment:
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
      - DATABASE_URL=${MONGODB_URI}
      - ALLOWED_ORIGIN=${CMS_ALLOWED_ORIGIN}
    restart: unless-stopped
    volumes:
      - payload-media:/app/media
    networks:
      - adl-network
  pdl-smor-api:
    image: ghcr.io/pdl-lex/smor-api:latest
    container_name: pdl-smor-api
    environment:
      - SMOR_DEMO_URL=${SMOR_DEMO_URL}
    networks:
      - adl-network
    restart: unless-stopped
  pdl-wbf-nlp-demo:
    image: ghcr.io/pdl-lex/wbf-nlp-demo:latest
    container_name: wbf-nlp-demo
    networks:
      - adl-network
    restart: unless-stopped
networks:
  adl-network:
    driver: bridge
volumes:
  caddy_data:
  caddy_config:
  mongodb_data:
  payload-media:
